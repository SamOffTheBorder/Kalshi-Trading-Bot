name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (pyright)
        run: uv run pyright src scripts

      - name: Verify .env.example is in sync with Settings
        run: |
          uv run python scripts/generate_env_example.py
          git diff --exit-code .env.example

      - name: Tests (unit + backtest; integration excluded)
        run: uv run pytest -q
